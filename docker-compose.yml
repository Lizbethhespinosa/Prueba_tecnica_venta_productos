version: '3.9'

services:

  db:
    image: postgres:16

    container_name: postgres_db

    restart: always

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data


  backend:
    build: .

    container_name: fastapi_backend

    restart: always

    ports:
      - "8000:8000"

    depends_on:
      - db

    env_file:
      - .env


volumes:
  postgres_data: